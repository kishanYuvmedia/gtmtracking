# Optional — only needed if you don't have PostgreSQL + Redis installed locally.
# If you have both running natively, ignore this file and use backend/.env directly.
#
# Quick start with Docker:
#   docker compose up -d postgres redis
#   cd backend && npm install && npm run migrate && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gtmtracking
      POSTGRES_USER: gtmtracking
      POSTGRES_PASSWORD: gtmtracking_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gtmtracking"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
